  /* ═══════════════════════════════════════════════════════════════════

  :root {
    --bg: #09090B;

    --border-focus: #3A3A40;

    --green: #4ADE80;
    --green-dim: #166534;

    --amber: #F59E0B;
    --amber-dim: #78350F;
    --amber-glow: rgba(245, 158, 11, 0.10);

    --radius-sm: 6px;
    --radius: 10px;
    --radius-lg: 14px;
    --font-display: 'Space Grotesk', system-ui, sans-serif;
    --font-body: 'Inter', system-ui, -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
  }

  /* ── Typography ─────────────────────────────────── */
  h1, h2, h3 { font-family: var(--font-display); }
  .mono { font-family: var(--font-mono); }

  /* ── Navigation ─────────────────────────────────── */
  .nav {
    position: sticky; top: 0; z-index: 100;
    background: rgba(9, 9, 11, 0.88);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .nav-inner {
    max-width: 1440px; margin: 0 auto; padding: 0 1.5rem;
    display: flex; align-items: center; justify-content: space-between;
    height: 52px;
  }
  .nav-left { display: flex; align-items: center; gap: 0.75rem; }
  .nav-logo {
    font-family: var(--font-display); font-weight: 700; font-size: 1.1rem;
    color: var(--green); text-decoration: none; letter-spacing: -0.01em;
  }
  .nav-badge {
    font-size: 0.7rem; background: var(--green-dim); color: var(--green);
    padding: 0.15rem 0.55rem; border-radius: 100px; font-weight: 600;
    letter-spacing: 0.03em; text-transform: uppercase;
  }
  .nav-right { display: flex; align-items: center; gap: 0.85rem; }
  .nav-link {
    color: var(--text-secondary); text-decoration: none;
    font-size: 0.85rem; font-weight: 500; transition: color 0.15s;

  .nav-link:hover { color: var(--text); }
  .nav-gh {
    display: flex; align-items: center; gap: 0.35rem;
    color: var(--text-muted); text-decoration: none;
    font-size: 0.8rem; transition: color 0.15s;
  }
  .nav-gh:hover { color: var(--text); }
  .nav-gh svg { width: 16px; height: 16px; }

  /* ── Main Layout ────────────────────────────────── */
  .main {
    display: grid;
    grid-template-columns: 380px 1fr;
    min-height: calc(100vh - 52px - 60px); /* nav + footer */
    max-width: 1440px;
    margin: 0 auto;
  }

  /* ── Controls Panel ─────────────────────────────── */
  .controls {
    border-right: 1px solid var(--border);
    padding: 1.75rem 1.5rem;
    overflow-y: auto;
    display: flex; flex-direction: column; gap: 1.35rem;
  }
  .controls-header { margin-bottom: 0.25rem; }
  .controls-header h2 {
    font-size: 1.15rem; font-weight: 600; letter-spacing: -0.01em;
    margin-bottom: 0.15rem;
  }
  .controls-header p { font-size: 0.8rem; color: var(--text-muted); }

  .field { display: flex; flex-direction: column; gap: 0.35rem; }
  .field-label {
    font-size: 0.78rem; font-weight: 600; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 0.05em;
    display: flex; align-items: center; justify-content: space-between;
  }
  .field-label .optional { font-weight: 400; color: var(--text-muted); text-transform: none; letter-spacing: 0; }

  .chrome-title {

  .preview-info {
    display: flex; align-items: center; justify-content: center;

  /* ── Empty State Overlay ────────────────────────── */
  .preview-empty {
    position: absolute; inset: 0; display: flex;
    align-items: center; justify-content: center;
    pointer-events: none;
  }

  /* ── Toast ──────────────────────────────────────── */
  .toast {
    position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%);
    background: var(--bg-elevated); border: 1px solid var(--green);
    color: var(--green); padding: 0.65rem 1.25rem; border-radius: 100px;
    font-size: 0.85rem; font-weight: 500;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);

  .toast.show { opacity: 1; }

  /* ── Footer ─────────────────────────────────────── */
  footer {
    border-top: 1px solid var(--border); padding: 1rem 1.5rem;

    .field-row { grid-template-columns: 1fr; }
    .nav-inner { padding: 0 1rem; }

  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }

</style>

     SnapOG Canvas Rendering Engine
     ═══════════════════════════════════════════════════════════════════ -->
<script>
'use strict';

// ── DOM refs ──────────────────────────────────────────────────────────
const canvas = document.getElementById('og-canvas');
const ctx = canvas.getContext('2d');

const $title = document.getElementById('title');
const $desc = document.getElementById('description');
const $domain = document.getElementById('domain');
const $author = document.getElementById('author');
const $tag = document.getElementById('tag');
const $template = document.getElementById('template');
const $themeLabel = document.getElementById('theme-label');
const $tplLabel = document.getElementById('tpl-label');
const $toast = document.getElementById('toast');

let theme = 'dark';
let watermark = true;

// ── Theme toggle ───────────────────────────────────────────────────────
document.getElementById('theme-toggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#theme-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  theme = btn.dataset.theme;
  $themeLabel.textContent = theme === 'dark' ? 'Dark' : 'Light';
  render();
});

// ── Watermark toggle ───────────────────────────────────────────────────
document.getElementById('watermark-toggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (!btn) return;
  document.querySelectorAll('#watermark-toggle button').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  watermark = btn.dataset.wm === '1';
  render();
});

// ── Input bindings ─────────────────────────────────────────────────────
[$title, $desc, $domain, $author, $tag, $template].forEach(el => {
  el.addEventListener('input', () => {
    $tplLabel.textContent = $template.options[$template.selectedIndex].text.split(' ')[0];
    render();
  });
});

// ── Toast ──────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  clearTimeout(toastTimer);
  $toast.textContent = msg;
  $toast.classList.add('show');
  toastTimer = setTimeout(() => $toast.classList.remove('show'), 2200);
}

// ── Download ───────────────────────────────────────────────────────────
document.getElementById('btn-download').addEventListener('click', () => {
  canvas.toBlob(blob => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const slug = ($title.value || 'og-image').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
    a.href = url;
    a.download = `${slug || 'og-image'}.png`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✓ Downloaded!');
  }, 'image/png');
});

// ── Copy to clipboard ──────────────────────────────────────────────────
document.getElementById('btn-copy').addEventListener('click', async () => {
  try {
    const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
    await navigator.clipboard.write([
      new ClipboardItem({ 'image/png': blob })
    ]);
    showToast('✓ Copied to clipboard!');
  } catch (err) {
    // Fallback: copy as data URL if ClipboardItem not supported
    try {
      const dataUrl = canvas.toDataURL('image/png');
      await navigator.clipboard.writeText(dataUrl);
      showToast('✓ Copied as data URL (image/png clipboard not supported)');
    } catch (e2) {
      showToast('✗ Failed to copy. Try Download instead.');
    }
  }
});

// ── Keyboard shortcut: Cmd/Ctrl+D to download ─────────────────────────
document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'd') {
    e.preventDefault();
    document.getElementById('btn-download').click();
  }
});

// ── Helper: draw rounded rect ──────────────────────────────────────────
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.arcTo(x + w, y, x + w, y + r, r);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.lineTo(x, y + r);
  ctx.arcTo(x, y, x + r, y, r);
  ctx.closePath();
}

// ── Helper: draw gradient background ───────────────────────────────────
function drawGradientBg(ctx, colors, angle) {
  const rad = (angle - 90) * Math.PI / 180;
  const x0 = W/2 - Math.cos(rad) * W;
  const y0 = H/2 - Math.sin(rad) * H;
  const x1 = W/2 + Math.cos(rad) * W;
  const y1 = H/2 + Math.sin(rad) * H;
  const grad = ctx.createLinearGradient(x0, y0, x1, y1);
  grad.addColorStop(0, colors[0]);
  grad.addColorStop(0.5, colors[1]);
  grad.addColorStop(1, colors[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
}

// ── Helper: draw text with optional max width (truncation) ─────────────
function drawText(ctx, text, x, y, maxWidth, font, fillStyle, align) {
  ctx.font = font;
  ctx.fillStyle = fillStyle;
  ctx.textAlign = align || 'left';
  ctx.textBaseline = 'top';
  if (maxWidth) {
    let truncated = text;
    while (ctx.measureText(truncated).width > maxWidth && truncated.length > 3) {
      truncated = truncated.slice(0, -4) + '…';
    }
    ctx.fillText(truncated, x, y);
  } else {
    ctx.fillText(text, x, y);
  }
}

// ── Helper: wrap text to fit width ─────────────────────────────────────
function wrapText(ctx, text, maxWidth, font, maxLines) {
  ctx.font = font;
  const words = text.split(' ');
  const lines = [];
  let current = '';

  for (const word of words) {
    const test = current ? current + ' ' + word : word;
    if (ctx.measureText(test).width <= maxWidth) {
      current = test;
    } else {
      if (current) lines.push(current);
      current = word;
      if (lines.length >= maxLines - 1) break;
    }
  }
  if (current && lines.length < maxLines) lines.push(current);

  // Truncate last line if needed
  if (lines.length > 0 && lines.length >= maxLines) {
    while (ctx.measureText(lines[lines.length - 1] + '…').width > maxWidth && lines[lines.length - 1].length > 3) {
      lines[lines.length - 1] = lines[lines.length - 1].slice(0, -4) + '…';
    }
  }

  return lines;
}

// ── Main render ────────────────────────────────────────────────────────
function render() {
  const tpl = $template.value;
  const p = PALETTES[tpl][theme];

  ctx.clearRect(0, 0, W, H);

  // ── Background ─────────────────────────────────────────────────────
  drawGradientBg(ctx, p.bg, p.bgAngle);

  // ── Decorative glow ────────────────────────────────────────────────
  ctx.save();
  const isSaaS = tpl === 'saas';
  const glowX = isSaaS ? W * 0.92 : W * 0.88;
  const glowY = isSaaS ? H * 0.10 : H * 0.15;
  const glowR = isSaaS ? 450 : 320;
  const glow = ctx.createRadialGradient(glowX, glowY, 0, glowX, glowY, glowR);
  glow.addColorStop(0, p.accent);
  glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow;
  ctx.fillRect(0, 0, W, H);
  ctx.restore();

  // ── Article / Podcast: accent bar ──────────────────────────────────
  if (tpl === 'article' || tpl === 'podcast') {
    ctx.fillStyle = p.domain;
    ctx.fillRect(0, 0, W, 4);
  }

  // ── GitHub: code braces watermark ──────────────────────────────────
  if (tpl === 'github') {
    ctx.save();
    ctx.font = `400 96px 'JetBrains Mono', monospace`;
    ctx.fillStyle = p.accent;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'bottom';
    ctx.fillText('{ }', PAD, H - PAD + 4);
    ctx.restore();
  }

  // ── Domain ─────────────────────────────────────────────────────────
  const domainText = ($domain.value || 'yourdomain.com').toUpperCase();
  drawText(ctx, domainText, PAD, PAD + 4, 400, `600 26px 'Space Grotesk', system-ui, sans-serif`, p.domain);

  // ── Thin divider below domain ──────────────────────────────────────
  ctx.strokeStyle = p.divider;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD, PAD + 52);
  ctx.lineTo(PAD + 48, PAD + 52);
  ctx.stroke();

  // ── Title ──────────────────────────────────────────────────────────
  const titleText = ($title.value || 'Enter a title…').trim();
  const titleFontSize = tpl === 'blog' ? 68 : 62;
  const titleFont = `700 ${titleFontSize}px 'Space Grotesk', system-ui, sans-serif`;
  const titleMaxWidth = W - PAD * 2;
  const titleLines = wrapText(ctx, titleText, titleMaxWidth, titleFont, 3);

  const titleY = tpl === 'blog' ? 200 : 210;
  const titleLineHeight = titleFontSize * 1.2;
  titleLines.forEach((line, i) => {
    ctx.font = titleFont;
    ctx.fillStyle = p.title;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(line, PAD, titleY + i * titleLineHeight);
  });

  // ── Description ────────────────────────────────────────────────────
  if ($desc.value.trim()) {
    const descText = $desc.value.trim();
    const descFontSize = tpl === 'blog' ? 28 : 26;
    const descFont = `${tpl === 'blog' ? '500' : '400'} ${descFontSize}px 'Inter', system-ui, sans-serif`;
    const descMaxWidth = tpl === 'blog' ? W - PAD * 2 : W * 0.65;
    const descY = titleY + titleLines.length * titleLineHeight + 22;
    const descLines = wrapText(ctx, descText, descMaxWidth, descFont, 2);

    descLines.forEach((line, i) => {
      ctx.font = descFont;
      ctx.fillStyle = p.desc;
      ctx.textAlign = 'left';
      ctx.textBaseline = 'top';
      ctx.fillText(line, PAD, descY + i * (descFontSize * 1.45));
    });
  }

  // ── Bottom bar: tag + author ───────────────────────────────────────
  const bottomY = H - PAD - 36;

  // Tag pill
  if ($tag.value.trim()) {
    const tagText = $tag.value.trim().toUpperCase();
    const tagFont = `600 18px 'Inter', system-ui, sans-serif`;
    ctx.font = tagFont;
    const tagW = ctx.measureText(tagText).width + 28;
    const tagH = 34;
    const tagX = PAD;
    const tagY = bottomY - tagH;

    roundRect(ctx, tagX, tagY, tagW, tagH, 17);
    ctx.fillStyle = p.tagBg;
    ctx.fill();
    ctx.strokeStyle = p.tagBorder;
    ctx.lineWidth = 1;
    ctx.stroke();

    ctx.font = tagFont;
    ctx.fillStyle = p.tagText;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(tagText, tagX + 14, tagY + 7);
  }

  // Author (bottom-right)
  if ($author.value.trim()) {
    const authorText = $author.value.trim();
    drawText(ctx, authorText, W - PAD, bottomY - 4, 300,
      `400 22px 'Inter', system-ui, sans-serif`, p.author, 'right');
  }

  // ── Watermark ──────────────────────────────────────────────────────
  if (watermark) {
    const wmText = 'Generated by SnapOG';
    const wmFont = `400 15px 'Inter', system-ui, sans-serif`;
    ctx.font = wmFont;
    const wmW = ctx.measureText(wmText).width;

    // subtle background pill
    const wmX = W - PAD - wmW - 22;
    const wmY = PAD + 4;
    roundRect(ctx, wmX, wmY, wmW + 20, 28, 14);
    ctx.fillStyle = 'rgba(255,255,255,0.06)';
    ctx.fill();

    ctx.font = wmFont;
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';
    ctx.fillText(wmText, wmX + 10, wmY + 5);
  }
}

// ── Initial render ─────────────────────────────────────────────────────
render();

// ── Handle font loading ────────────────────────────────────────────────
document.fonts.ready.then(() => render());
